name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stamp the commit SHA onto the app.js URL so each deploy is a unique
      # path the browser cannot serve stale. Only the deployed copy is
      # modified (CI checkout is ephemeral); the committed index.html keeps
      # the plain src for local development.
      - name: Cache-bust app.js
        run: sed -i "s|src=\"js/app.js\"|src=\"js/app.js?v=${GITHUB_SHA}\"|" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
